resources:
  pipelines:
    maven_market_main:
      name: "[${bundle.target}] Maven Market Medallion"
      # FIX: Ensure target uses the variable we declared in databricks.yml
      target: ${var.target_catalog}

      permissions:
        - user_name: "tansh4147@gmail.com"
          level: "CAN_MANAGE"
      
      libraries:
        # FIX: Ensure the path is relative to THIS yml file
        - file:
            path: ../src/pipelines/bronze/ingest_csv.py
        - file:
            path: ../src/pipelines/bronze/ingest_kafka.py
        - file:
            path: ../src/pipelines/bronze/ingest_mongo.py
        # Add silver/gold folders here as they are created
        # - notebook: 
        #     path: ../src/pipelines/silver/

      configuration:
        # FIX: The config_path must match the variable in databricks.yml
        config_path: ${var.config_file}
        bundle.environment: ${bundle.target}

      clusters:
        - label: default
          policy_id: "D09C0637650005C8" 
          autoscale:
            min_workers: 1
            max_workers: 2
            mode: ENHANCED
            
      # Sets development mode based on the bundle target
      development: ${var.pipelines_development}