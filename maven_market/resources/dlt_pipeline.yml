resources:
  pipelines:
    maven_market_main:
      name: "[${bundle.target}] Maven Market Medallion"
      catalog: ${var.target_catalog}
      
      libraries:
        - file:
            path: ../src/pipelines/bronze/ingest_csv.py
        - file:
            path: ../src/pipelines/bronze/ingest_kafka_inventory.py
        - file:
            path: ../src/pipelines/bronze/ingest_kafka_orders.py
        - file:
            path: ../src/pipelines/bronze/ingest_mongo.py

      configuration:
        # Source paths for the datasets
        bundle.source_path_transactions: "abfss://raw-data@mavengrp4.dfs.core.windows.net/transactions/"
        bundle.source_path_regions: "abfss://raw-data@mavengrp4.dfs.core.windows.net/regions/"
        bundle.source_path_stores: "abfss://raw-data@mavengrp4.dfs.core.windows.net/stores/"
        bundle.source_path_returns: "abfss://raw-data@mavengrp4.dfs.core.windows.net/returns/"
        bundle.source_path_calendar: "abfss://raw-data@mavengrp4.dfs.core.windows.net/calendar/"

      clusters:
        - label: default
          # D4s_v5 is a 4-core machine that usually has high availability
          node_type_id: "Standard_DS3_v2"
          num_workers: 0                   
          spark_conf:
            spark.databricks.cluster.profile: "singleNode"
            spark.master: "local[*]"
          custom_tags:
            ResourceClass: "SingleNode"
            
      development: ${var.pipelines_development}