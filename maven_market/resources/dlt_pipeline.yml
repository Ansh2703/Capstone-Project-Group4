resources:
  pipelines:
    maven_market_main:
      name: "[${bundle.target}] Maven Market Medallion"
      # Use the variables from databricks.yml for better flexibility
      catalog: ${var.target_catalog}
      target: ${var.target_schema}
      #for better compute
      serverless: true


      
      libraries:
        - file:
            path: ../src/pipelines/bronze/ingest_csv.py
        - file:
            path: ../src/pipelines/bronze/ingest_kafka_inventory.py
        - file:
            path: ../src/pipelines/bronze/ingest_kafka_orders.py
        - file:
            path: ../src/pipelines/bronze/ingest_mongo.py

        - file:
            path: ../src/pipelines/silver/silver_csv_dlt.py
        - file:
            path: ../src/pipelines/silver/silver_kafka_dlt.py
        - file:
            path: ../src/pipelines/silver/silver_mongo_dlt.py
        - file:
            path: ../src/pipelines/gold/gold_dlt.py

      configuration:
        # These keys match the spark.conf.get calls in your new Python files
        bundle.source_path_transactions: "abfss://maven-market-data@mavengrp4.dfs.core.windows.net/raw/transactions/"
        bundle.source_path_regions: "abfss://maven-market-data@mavengrp4.dfs.core.windows.net/raw/regions/"
        bundle.source_path_stores: "abfss://maven-market-data@mavengrp4.dfs.core.windows.net/raw/stores/"
        # Fixed key name 'return' to match the list in your ingest_csv.py
        bundle.source_path_return: "abfss://maven-market-data@mavengrp4.dfs.core.windows.net/raw/return/"
        bundle.source_path_calendar: "abfss://maven-market-data@mavengrp4.dfs.core.windows.net/raw/calendar/"
        bundle.source_path_customers: "abfss://maven-market-data@mavengrp4.dfs.core.windows.net/raw/atlas/mongo_maven_db/customers/"
        bundle.source_path_products: "abfss://maven-market-data@mavengrp4.dfs.core.windows.net/raw/atlas/mongo_maven_db/products/"
