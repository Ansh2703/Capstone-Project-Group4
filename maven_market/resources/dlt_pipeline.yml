resources:
  pipelines:
    maven_market_main:
      name: "[${bundle.target}] Maven Market Medallion"
      
      # This tells DLT which catalog to use (maven_market_dev)
      catalog: ${var.target_catalog}
      
      # We remove the hardcoded 'schema' so your Python code 
      # can place tables in .bronze, .silver, or .gold dynamically.

      libraries:
        - file:
            path: ../src/pipelines/bronze/ingest_csv.py
        - file:
            path: ../src/pipelines/bronze/ingest_kafka_inventory.py
        - file:
            path: ../src/pipelines/bronze/ingest_kafka_orders.py
        - file:
            path: ../src/pipelines/bronze/ingest_mongo.py

      configuration:
        config_path: ${var.config_file}
        bundle.environment: ${bundle.target}

      clusters:
        - label: default 
          autoscale:
            min_workers: 1
            max_workers: 2
            mode: ENHANCED
            
      development: ${var.pipelines_development}