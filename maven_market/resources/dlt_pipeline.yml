resources:
  pipelines:
    maven_market_main:
      name: "[${bundle.target}] Maven Market Medallion"
      # Use the variables from databricks.yml for better flexibility
      catalog: ${var.target_catalog}
      target: ${var.target_schema}
      
      libraries:
        - file:
            path: ../src/pipelines/bronze/ingest_csv.py
        - file:
            path: ../src/pipelines/bronze/ingest_kafka_inventory.py
        - file:
            path: ../src/pipelines/bronze/ingest_kafka_orders.py
        - file:
            path: ../src/pipelines/bronze/ingest_mongo.py

      configuration:
        # These keys match the spark.conf.get calls in your new Python files
        bundle.source_path_transactions: "abfss://maven-market-data@mavengrp4.dfs.core.windows.net/transactions/"
        bundle.source_path_regions: "abfss://maven-market-data@mavengrp4.dfs.core.windows.net/regions/"
        bundle.source_path_stores: "abfss://maven-market-data@mavengrp4.dfs.core.windows.net/stores/"
        # Fixed key name 'return' to match the list in your ingest_csv.py
        bundle.source_path_return: "abfss://maven-market-data@mavengrp4.dfs.core.windows.net/returns/"
        bundle.source_path_calendar: "abfss://maven-market-data@mavengrp4.dfs.core.windows.net/calendar/"
        bundle.source_path_customers: "abfss://maven-market-data@mavengrp4.dfs.core.windows.net/raw/atlas/mongo_maven_db/customers/"
        bundle.source_path_products: "abfss://maven-market-data@mavengrp4.dfs.core.windows.net/raw/atlas/mongo_maven_db/products/"

      clusters:
        - label: default
          node_type_id: "Standard_DS3_v2" # 4 cores, fits your quota
          num_workers: 0                   
          spark_conf:
            spark.databricks.cluster.profile: "singleNode"
            spark.master: "local[*]"
          custom_tags:
            ResourceClass: "SingleNode"