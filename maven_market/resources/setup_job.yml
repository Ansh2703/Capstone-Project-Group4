resources:
  jobs:
    setup_infrastructure:
      name: "[${bundle.target}] Project Infrastructure Setup"
      tasks:
        - task_key: run_setup_script
          spark_python_task:
            # Path must be relative to this yml file
            python_file: "../scripts/setup_uc.py" 
          job_cluster_key: setup_cluster
      
      job_clusters:
        - job_cluster_key: setup_cluster
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            node_type_id: "Standard_DS3_v2"
            num_workers: 0
            spark_conf:
              spark.databricks.cluster.profile: "singleNode"
              spark.master: "local[*]"
            custom_tags:
              ResourceClass: "SingleNode"