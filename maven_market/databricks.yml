bundle:
  name: "maven_market_v3"

# 1. Loading the resources
include:
  - resources/*.yml

# 2. DEFINING THE VARIABLES
variables:
  target_catalog:
    description: "The catalog where data will be stored"
    default: "maven_market_uc"
  target_schema:
    description: "The schema (database) for the tables"
    default: "bronze"
  config_file:
    description: "Path to the environment config"
    default: "${workspace.file_path}/config/dev_config.yaml"
  pipelines_development:
    description: "Enable development mode for DLT"
    default: "true"

# 3. Target Overrides
targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://adb-7405612262402698.18.azuredatabricks.net
      root_path: ~/.bundle/${bundle.name}/dev
    variables:
      target_catalog: "maven_market_uc"
      target_schema: "bronze"
      pipelines_development: "true"

  main:
    mode: production
    workspace:
      host: https://adb-7405612262402698.18.azuredatabricks.net
      root_path: /Shared/.bundle/${bundle.name}/prod
    run_as:
      service_principal_name: "5e35aeb2-73b1-4dd2-92cf-ae0e4829bb65"
    variables:
      target_catalog: "maven_market_uc"
      target_schema: "bronze"
      pipelines_development: "false"
