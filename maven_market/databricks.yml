# Declarative Automation Bundle configuration
# See: https://docs.databricks.com/en/dev-tools/bundles/settings.html

bundle:
  name: "Maven Market CI/CD"

on:
  push:
    branches: [main, dev]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: "Deploy to Databricks"
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - uses: actions/checkout@v4

      # Setup Databricks CLI
      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main

      # Deploy bundle (FIXED)
      - name: Deploy Bundle
        working-directory: ./maven_market   # keep this ONLY if databricks.yml is inside this folder
        run: |
          # ❌ REMOVED dev deployment completely
          # ✅ Always deploy to prod (CI/CD safe)
          databricks bundle deploy -t prod
        env:
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}