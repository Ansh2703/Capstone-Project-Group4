# Maven Market - Secure Retail Analytics Lakehouse
bundle:
  name: "maven_market_v3"
  deployment:
    # Disabling the lock prevents "Cannot apply local deployment permissions" errors in automated pipelines
    lock:
      enabled: false

# Global permissions: Data Architect (you) maintains full control
permissions:
  - user_name: "tansh4147@gmail.com"
    level: "CAN_MANAGE"
  - group_name: "users"
    level: "CAN_USE"

include:
  - resources/*.yml

variables:
  target_catalog:
    description: "The Unity Catalog catalog name (dev or prod)"
    default: "maven_market_dev"
  
  config_file:
    description: "Path to the YAML configuration file"
    default: "/Workspace${workspace.file_path}/config/dev_config.yaml" 

  pipelines_development:
    description: "Boolean to set DLT pipeline to development mode"
    default: "true"

targets:
  # Development Target (Triggered by 'dev' branch)
  dev:
    mode: development
    default: true
    workspace:
      host: https://adb-7405605358658093.13.azuredatabricks.net
      root_path: /Shared/.bundle/${bundle.name}/dev
    variables:
      target_catalog: "maven_market_dev"
      config_file: "/Workspace${workspace.file_path}/config/dev_config.yaml"
      pipelines_development: "true"

  # Production Target (Triggered by 'main' branch)
  main:
    mode: production
    workspace:
      host: https://adb-7405605358658093.13.azuredatabricks.net
      root_path: /Shared/.bundle/${bundle.name}/prod
    run_as:
      # Run as the Service Principal to utilize the verified Unity Catalog & Secret permissions
      service_principal_name: "91d7acfb-a1bd-43fb-9024-27fbeb59da96"
    variables:
      target_catalog: "maven_market_uc"
      config_file: "/Workspace${workspace.file_path}/config/prod_config.yaml"
      pipelines_development: "false"