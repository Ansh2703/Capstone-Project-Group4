# Declarative Automation Bundle configuration, more info here: https://docs.databricks.com/en/dev-tools/bundles/settings.html
bundle:
  name: "maven_market"

include:
  - resources/*.yml
  - resources/*/*.yml

variables:
  # This finds the root of your project in the Workspace
  config_file:
    description: "Path to the configuration file"
    default: "/Workspace${workspace.file_path}/config/dev_config.yaml"


targets:
  # Development Target
  dev:
    mode: development
    default: true
    workspace:
      host: https://adb-7405605358658093.13.azuredatabricks.net
    variables:
      # This points to your dev config file
      config_file: "/Workspace${workspace.file_path}/config/dev_config.yaml"

  # Production Target
  main:
    mode: production
    workspace:
      host: https://adb-7405605358658093.13.azuredatabricks.net
      root_path: /Users/tansh4147@gmail.com/.bundle/${bundle.name}/${bundle.target}
    run_as:
      user_name: tansh4147@gmail.com
    variables:
      # This points to your prod config file
      config_file: "/Workspace${workspace.file_path}/config/prod_config.yaml"

