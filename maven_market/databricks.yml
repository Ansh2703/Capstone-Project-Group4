# Declarative Automation Bundle configuration
# See: https://docs.databricks.com/en/dev-tools/bundles/settings.html
bundle:
  name: "maven_market"

include:
  - resources/*.yml
  - resources/*/*.yml

variables:
  # 1. The catalog where DLT tables will be created
  target_catalog:
    description: "Target catalog for the medallion layers"
    default: "maven_market_dev"
  
  # 2. Dynamic path to the environment-specific config file
  config_file:
    description: "Path to the configuration file in the workspace"
    default: "${workspace.file_path}/config/dev_config.yaml"

  # 3. Controls DLT development mode (optimized for dev vs prod)
  pipelines_development:
    description: "Boolean to set DLT pipeline to development mode"
    default: "true"

targets:
  # Development Target (used for 'dev' branch)
  dev:
    mode: development
    default: true
    workspace:
      host: https://adb-7405605358658093.13.azuredatabricks.net
    variables:
      target_catalog: "maven_market_dev"
      config_file: "${workspace.file_path}/config/dev_config.yaml"
      pipelines_development: "true"

  # Production Target (used for 'main' branch)
  main:
    mode: production
    workspace:
      host: https://adb-7405605358658093.13.azuredatabricks.net
      # Centralized root path for production resources
      root_path: /Users/tansh4147@gmail.com/.bundle/${bundle.name}/${bundle.target}
    run_as:
      user_name: tansh4147@gmail.com
    variables:
      target_catalog: "maven_market_prod"
      config_file: "${workspace.file_path}/config/prod_config.yaml"
      pipelines_development: "false"