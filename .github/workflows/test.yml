name: "Maven Market Tests"

# ── Trigger: runs on every push and PR to main/dev ──
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: "Run Unit Tests"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 11 (required by PySpark)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "11"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyspark==4.0.0.dev2 pandas pyarrow pytest
          # Install project requirements if any exist
          if [ -s maven_market/requirements.txt ]; then
            pip install -r maven_market/requirements.txt
          fi

      - name: Run pytest
        working-directory: ./maven_market
        env:
          # Force local PySpark (not Spark Connect) for unit tests
          SPARK_REMOTE: ""
        run: |
          python -m pytest tests/ -v --tb=short -p no:cacheprovider \
            --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: maven_market/test-results.xml
