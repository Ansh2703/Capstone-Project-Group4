name: "Maven Market CI/CD"

on:
  push:
    branches: [main, dev]

# Recommended to bypass Node.js deprecation warnings until default change
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: "Deploy to Databricks"
    runs-on: ubuntu-latest
    steps:
      # Step 1: Upgrade to v4+ for Node.js 24 compatibility
      - uses: actions/checkout@v4

      # Step 2: Setup the CLI
      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main

      # Step 3: Use working-directory to find your databricks.yml
      - name: Deploy Bundle
        working-directory: ./maven_market 
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            databricks bundle deploy -t main
          else
            databricks bundle deploy -t dev
          fi
        env:
          # Use the Service Principal credentials for Enterprise-grade security
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}