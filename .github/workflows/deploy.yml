name: "Maven Market CI/CD"

on:
  push:
    branches: [main, dev]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: "Deploy to Databricks"
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout repository
      - uses: actions/checkout@v4

      # Step 2: ARCHITECT FIX - Manually refresh HashiCorp GPG key
      # This step bypasses the "openpgp: key expired" error by updating the system keyring.
      - name: Fix HashiCorp GPG Key
        run: |
          sudo apt-get update && sudo apt-get install -y gnupg software-properties-common
          wget -O- https://apt.releases.hashicorp.com/gpg | \
          gpg --dearmor | \
          sudo tee /usr/share/keyrings/hashicorp-archive-keyring.gpg > /dev/null
          # Verify the new key is active
          gpg --no-default-keyring --keyring /usr/share/keyrings/hashicorp-archive-keyring.gpg --fingerprint

      # Step 3: Setup Databricks CLI
      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main

      # Step 4: Deploy Logic
      - name: Deploy Bundle
        working-directory: ./maven_market 
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            databricks bundle deploy -t main
          else
            databricks bundle deploy -t dev
          fi
        env:
          # Auth via Service Principal OAuth secrets
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}