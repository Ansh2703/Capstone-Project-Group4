name: "Maven Market CI/CD"

on:
  push:
    branches: [main, dev]

# Ensures Node 24 support for modern GitHub Actions
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: "Deploy to Databricks"
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout code
      - uses: actions/checkout@v4

      # Step 2: Setup Databricks CLI (@main ensures the latest features)
      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main

      # Step 3: Deployment Logic
      - name: Deploy Bundle
        working-directory: ./maven_market 
        run: |
          # The Direct Engine skips Terraform downloads entirely.
          if [ "${{ github.ref_name }}" == "main" ]; then
            databricks bundle deploy -t main
          else
            databricks bundle deploy -t dev
          fi
        env:
          # Auth via Service Principal OAuth secrets
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}