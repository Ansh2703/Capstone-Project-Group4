name: "Maven Market CI/CD"

on:
  push:
    branches: [main, dev]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: "Deploy to Databricks"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Step 2: ARCHITECT FIX - Manually install Terraform
      # This prevents the Databricks CLI from failing on the expired PGP key
      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.5"
          terraform_wrapper: false

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main

      - name: Deploy Bundle
        working-directory: ./maven_market 
        run: |
          # Use the pre-installed Terraform for validation and deployment
          if [ "${{ github.ref_name }}" == "main" ]; then
            databricks bundle validate -t main
            databricks bundle deploy -t main
          else
            databricks bundle validate -t dev
            databricks bundle deploy -t dev
          fi
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}