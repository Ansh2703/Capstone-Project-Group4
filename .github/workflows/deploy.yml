name: "Maven Market CI/CD"

on:
  push:
    branches: [main, dev]

# Recommended to bypass Node.js deprecation warnings and ensure Node 24 support
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: "Deploy to Databricks"
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout the repository
      - uses: actions/checkout@v4

      # Step 2: Setup the latest Databricks CLI (@main ensures recent bug fixes)
      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main

      # Step 3: Execute Deployment Logic
      - name: Deploy Bundle
        working-directory: ./maven_market 
        run: |
          # ARCHITECT LOGIC: Perform a validation first. 
          # This forces the CLI to pull the Terraform version (1.5.5) defined 
          # in your databricks.yml, bypassing the expired key error.
          
          echo "Validating bundle for target: ${{ github.ref_name == 'main' && 'main' || 'dev' }}"
          
          if [ "${{ github.ref_name }}" == "main" ]; then
            databricks bundle validate -t main
            databricks bundle deploy -t main
          else
            databricks bundle validate -t dev
            databricks bundle deploy -t dev
          fi
        env:
          # Enterprise Auth: Using the Service Principal credentials you saved in GitHub Secrets
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}