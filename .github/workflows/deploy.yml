name: "Maven Market CI/CD"

on:
  push:
    branches: [main, dev]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: "Deploy to Databricks"
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout repository
      - uses: actions/checkout@v4

      # Step 2: ARCHITECT FIX - Manually install Terraform
      # This completely bypasses the 'error downloading Terraform' and PGP key issues.
      - name: Install and Link Terraform
        run: |
          wget https://releases.hashicorp.com/terraform/1.5.5/terraform_1.5.5_linux_amd64.zip
          unzip terraform_1.5.5_linux_amd64.zip
          sudo mv terraform /usr/local/bin/
          # Ensure Databricks CLI finds this local version
          mkdir -p ~/.databricks/bin
          cp /usr/local/bin/terraform ~/.databricks/bin/terraform
          terraform --version

      # Step 3: Setup Databricks CLI
      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main

      # Step 4: Deploy Logic
      - name: Deploy Bundle
        working-directory: ./maven_market 
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            databricks bundle deploy -t main
          else
            databricks bundle deploy -t dev
          fi
        env:
          # Auth via Service Principal OAuth secrets
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          # Explicitly tell the CLI to use the pre-installed Terraform
          DATABRICKS_TERRAFORM_PATH: /usr/local/bin/terraform