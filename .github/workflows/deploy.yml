name: "Maven Market CI/CD"

on:
  push:
    branches: [main, dev]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: "Deploy to Databricks"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Bundle
        working-directory: ./maven_market 
        run: |
          # 1. Deploy the new resource definitions
          databricks bundle deploy -t ${{ github.ref_name == 'main' && 'main' || 'dev' }}
          
          # 2. Execute the setup job to create missing catalogs
          # This must run before your DLT pipeline starts for the first time
          databricks bundle run setup_infrastructure -t ${{ github.ref_name == 'main' && 'main' || 'dev' }}
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_BUNDLE_ENGINE: direct