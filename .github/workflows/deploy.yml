name: "Maven Market CI/CD"

on:
  push:
    branches: [main, dev]
  workflow_dispatch:
    inputs:
      target:
        description: 'Select Target Environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: "Deploy and Run"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Deploy and Trigger Pipeline
        working-directory: ./maven_market 
        run: |
          # 1. Logic to handle both Auto-Push and Manual Button
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TARGET="${{ github.event.inputs.target }}"
          else
            TARGET=${{ github.ref_name == 'main' && 'main' || 'dev' }}
          fi
          
          echo "Processing target: $TARGET"
          
          # 2. Deploy (This updates your cluster settings to the new node type)
          databricks bundle deploy -t $TARGET
          
          # 3. CONDITIONAL RUN: Only trigger if the user clicked the manual button
          # This prevents a "push" from automatically wasting your 4-core quota.
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "Manual trigger detected. Starting DLT Pipeline..."
            databricks bundle run maven_market_main --refresh-all -t $TARGET
          else
            echo "Auto-push detected. Code deployed, but pipeline NOT started to save quota."
          fi
          
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_BUNDLE_ENGINE: direct