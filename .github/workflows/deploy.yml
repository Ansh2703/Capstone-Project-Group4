name: "Maven Market CI/CD"

on:
  push:
    branches: [main, dev]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: "Deploy to Databricks"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ARCHITECT FIX: Install Databricks CLI via curl to guarantee it's in the PATH
      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          databricks version

      - name: Deploy Bundle
        working-directory: ./maven_market 
        run: |
          # Detect target based on branch
          TARGET=${{ github.ref_name == 'main' && 'main' || 'dev' }}
          
          echo "Deploying to target: $TARGET"
          
          # 1. Deploy resource definitions
          databricks bundle deploy -t $TARGET
          
          # 2. RUN setup script to create missing catalogs/schemas
          databricks bundle run setup_infrastructure -t $TARGET
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_BUNDLE_ENGINE: direct